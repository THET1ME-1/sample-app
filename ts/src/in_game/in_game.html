<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../css/general.css" />
  <link rel="stylesheet" href="../../css/header.css" />
  <link rel="stylesheet" href="../../css/ingame.css" />
  <title>VisionWatch — Overlay</title>
</head>
<body class="in-game">

  <!-- ── Header ────────────────────────────────────────────────────────── -->
  <header id="header" class="app-header">
    <span class="logo-icon-sm">👁</span>
    <img id="map-thumb" src="" alt="" style="display:none">
    <div class="map-info">
      <span id="map-name" class="map-name">Ожидание матча…</span>
      <span id="map-type" class="map-type"></span>
    </div>
    <div class="match-state-badge" id="match-state-badge"></div>
    <div class="hotkey-hint">
      <kbd id="hotkey-text">Ctrl+Shift+Z</kbd>
    </div>
    <div class="window-controls-group">
      <button id="minimizeButton" class="window-control window-control-minimize"></button>
      <button id="closeButton"    class="window-control window-control-close"></button>
    </div>
  </header>

  <!-- ── Main content ──────────────────────────────────────────────────── -->
  <main>

    <!-- ── Roster ──────────────────────────────────────────────────────── -->
    <div class="roster-section">
      <div class="roster-col ally-col">
        <div class="roster-col-title">MY TEAM</div>
        <div id="roster-ally" class="roster-list"></div>
      </div>
      <div class="roster-col enemy-col">
        <div class="roster-col-title">ENEMY TEAM</div>
        <div id="roster-enemy" class="roster-list"></div>
      </div>
    </div>

    <!-- ── Recommendations ─────────────────────────────────────────────── -->
    <div class="recs-section" id="recs-section">
      <div class="recs-row">
        <div class="rec-block">
          <div class="rec-title">🗺 Лучшие герои на карте</div>
          <div id="rec-map-heroes" class="rec-chips"></div>
        </div>
        <div class="rec-block">
          <div class="rec-title">🔄 Контрпики против врагов</div>
          <div id="rec-counters" class="rec-chips"></div>
        </div>
      </div>
    </div>

    <!-- ── Waiting state ───────────────────────────────────────────────── -->
    <div id="waiting-msg" class="waiting-msg">
      <div class="waiting-icon">👁</div>
      <div>Ожидание начала матча…</div>
      <div class="muted">Оверлей обновится когда матч начнётся</div>
    </div>

  </main>

</body>
</html>
